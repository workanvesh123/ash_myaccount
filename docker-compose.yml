version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myaccount-backend
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=MyAccount;User=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
    depends_on:
      - db
    networks:
      - myaccount-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myaccount-frontend
    ports:
      - "4200:80"
    environment:
      - API_URL=http://backend:80
    depends_on:
      - backend
    networks:
      - myaccount-network
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: myaccount-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - myaccount-network
    restart: unless-stopped

networks:
  myaccount-network:
    driver: bridge

volumes:
  sqldata:
    driver: local
